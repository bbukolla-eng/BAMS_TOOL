name: Release Desktop

on:
  push:
    tags:
      - 'v*'
      - 'V*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. V1.0.1)'
        required: true
        default: 'V1.0.1'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_cmd: build:linux
            artifact_glob: "dist-desktop/*.AppImage dist-desktop/*.deb"
          - os: windows-latest
            build_cmd: build:win
            artifact_glob: "dist-desktop/*.exe"
          - os: macos-latest
            build_cmd: build:mac
            artifact_glob: "dist-desktop/*.dmg"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build desktop installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""
          ELECTRON_SKIP_NOTARIZATION: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd desktop
          npm ci
          npm run ${{ matrix.build_cmd }}

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ matrix.artifact_glob }}
          fail_on_unmatched_files: false
