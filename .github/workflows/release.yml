name: Release Desktop

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            build_cmd: build:linux
            artifact_glob: "dist-desktop/*.AppImage dist-desktop/*.deb"
          - os: windows-latest
            build_cmd: build:win
            artifact_glob: "dist-desktop/*.exe"
          - os: macos-latest
            build_cmd: build:mac
            artifact_glob: "dist-desktop/*.dmg"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build desktop installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd desktop
          npm ci
          npm run ${{ matrix.build_cmd }}

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
